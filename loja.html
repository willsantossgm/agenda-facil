<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitrine do Estabelecimento - AgendaFácil</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/loja.css">
</head>
<body>

  <!-- Orbes decorativas no fundo -->
  <div class="bg-orb bg-orb-primary"></div>
  <div class="bg-orb bg-orb-secondary" style="top: 60%; right: 10%;"></div>

  <div class="store-container">
    
    <!-- Perfil da Loja -->
    <header class="store-header card" id="store-profile-header">
      <img src="https://images.unsplash.com/photo-1585747860715-2ba37e788b70?w=1200&auto=format&fit=crop&q=80" alt="Capa do Estabelecimento" class="store-cover" id="store-cover-img">
      <div class="store-profile">
        <div class="store-info">
          <h1 id="store-name">Nome do Estabelecimento</h1>
          <div class="store-meta">
            <span class="status-badge" id="store-status">Aberto</span>
            <span id="store-hours">📍 Carregando horário...</span>
            <span id="store-address">📍 Carregando endereço...</span>
          </div>
        </div>
        <div class="flex gap-2">
          <a href="#" class="btn btn-outline btn-sm" id="btn-map" target="_blank">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Ver Mapa
          </a>
        </div>
      </div>
    </header>

    <!-- Filtro de Categorias -->
    <nav class="categories-slider" id="categories-list">
      <!-- Injetado dinamicamente -->
      <button class="category-pill active">Todos</button>
    </nav>

    <!-- Vitrine de Produtos/Serviços -->
    <main class="products-grid animate-fade-in" id="products-list">
      <!-- Injetado dinamicamente -->
    </main>

  </div>

  <!-- Botão Flutuante do Carrinho -->
  <button class="cart-floating-btn" id="btn-open-cart">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    <div class="cart-badge" id="cart-counter">0</div>
  </button>

  <!-- Sidebar / Drawer do Carrinho -->
  <div class="modal-overlay" id="cart-overlay"></div>
  <aside class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h3>Seu Pedido</h3>
      <button class="btn btn-ghost btn-sm" id="btn-close-cart" style="padding: 0.25rem;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="cart-items" id="cart-items-list">
      <!-- Itens do carrinho injetados dinamicamente -->
    </div>

    <!-- Seção Condicional de Agendamento (exibida se houver serviços no carrinho) -->
    <div class="scheduler-section" id="scheduler-section" style="display: none;">
      <div class="scheduler-title">Agendar Horário</div>
      
      <div class="form-group">
        <label class="form-label" for="booking-date">Data</label>
        <input type="date" class="form-input" id="booking-date">
      </div>

      <div class="form-group">
        <label class="form-label" for="booking-time">Horário Disponível</label>
        <select class="form-input form-select" id="booking-time">
          <option value="">Selecione a data primeiro</option>
        </select>
      </div>
    </div>

    <!-- Informações do Cliente -->
    <div class="p-4" style="border-top: 1px solid var(--border-color); background: rgba(0,0,0,0.1);">
      <div class="scheduler-title" style="margin-bottom: 0.75rem;">Seus Dados</div>
      <div class="form-group">
        <label class="form-label" for="client-name">Nome Completo</label>
        <input type="text" class="form-input" id="client-name" placeholder="Ex: João Silva" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="client-phone">Celular (WhatsApp)</label>
        <input type="tel" class="form-input" id="client-phone" placeholder="Ex: 11999999999" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="client-notes">Observações</label>
        <textarea class="form-input" id="client-notes" placeholder="Ex: Ponto de referência, tirar cebola do lanche, etc." rows="2" style="resize: none;"></textarea>
      </div>
    </div>

    <div class="cart-footer">
      <div class="cart-total">
        <span>Total:</span>
        <span id="cart-total-value">R$ 0,00</span>
      </div>
      <button class="btn btn-primary btn-full" id="btn-checkout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Confirmar via WhatsApp
      </button>
    </div>
  </aside>

  <!-- Scripts -->
  <script src="js/store.js"></script>
  <script src="js/loja.js"></script>
</body>
</html>
